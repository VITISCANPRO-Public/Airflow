# ══════════════════════════════════════════════════════════════════════════════
# VITISCAN AIRFLOW — CI PIPELINE
# ══════════════════════════════════════════════════════════════════════════════
#
# This workflow runs automatically on every push and pull request.
# It ensures code quality before changes reach production.
#
# Jobs:
#   1. lint        → Check code style and catch common errors
#   2. validate    → Verify DAGs can be parsed by Airflow
#
# ══════════════════════════════════════════════════════════════════════════════

name: CI Pipeline

# ── When to run this workflow ─────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: LINT
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: |
          echo "Running linter on dags/ folder..."
          ruff check dags/ --select E,F,I --output-format=github
          echo "Linting passed!"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: VALIDATE DAGS
  # ════════════════════════════════════════════════════════════════════════════
  validate-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ════════════════════════════════════════════════════════════════════════
      # FIX: Install from requirements.txt WITHOUT external constraints
      # The old constraints file was for Airflow 2.9.0, incompatible with 3.1.3
      # ════════════════════════════════════════════════════════════════════════
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize Airflow
        run: |
          export AIRFLOW_HOME=${{ github.workspace }}
          export AIRFLOW__CORE__DAGS_FOLDER=${{ github.workspace }}/dags
          export AIRFLOW__CORE__LOAD_EXAMPLES=False
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:///${{ github.workspace }}/airflow.db
          airflow db migrate

      - name: Validate DAG syntax
        run: |
          export AIRFLOW_HOME=${{ github.workspace }}
          export AIRFLOW__CORE__DAGS_FOLDER=${{ github.workspace }}/dags
          export AIRFLOW__CORE__LOAD_EXAMPLES=False
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:///${{ github.workspace }}/airflow.db
          
          echo "Validating DAG files..."
          airflow dags list
          
          echo ""
          echo "Checking for import errors..."
          airflow dags list-import-errors || true
          
          echo ""
          echo "All DAGs validated successfully!"

      - name: Show DAG structure
        run: |
          export AIRFLOW_HOME=${{ github.workspace }}
          export AIRFLOW__CORE__DAGS_FOLDER=${{ github.workspace }}/dags
          export AIRFLOW__CORE__LOAD_EXAMPLES=False
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:///${{ github.workspace }}/airflow.db
          
          echo "DAG: dag_monitoring"
          airflow tasks list dag_monitoring --tree || true
          
          echo ""
          echo "DAG: dag_data_ingestion"
          airflow tasks list dag_data_ingestion --tree || true
          
          echo ""
          echo "DAG: dag_retraining"
          airflow tasks list dag_retraining --tree || true