# ══════════════════════════════════════════════════════════════════════════════
# VITISCAN AIRFLOW CONFIGURATION
# ══════════════════════════════════════════════════════════════════════════════
#
# This file contains ONLY the custom configurations needed for Vitiscan.
# All other settings use Airflow defaults.
#
# For the full list of available options, see:
# https://airflow.apache.org/docs/apache-airflow/stable/configurations-ref.html
#
# ══════════════════════════════════════════════════════════════════════════════

[core]
# The folder where your airflow pipelines live
dags_folder = /opt/airflow/dags

# The executor class that airflow should use
# Using CeleryExecutor for distributed task execution
# Using sequentialExecutor for demo
executor = SequentialExecutor

# FIX: Auth manager must match docker-compose.yaml
# BEFORE: auth_manager = airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
# AFTER: Using FAB (Flask-AppBuilder) for proper user management
auth_manager = airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

# Whether to load the DAG examples that ship with Airflow
# Disabled to keep the UI clean
load_examples = False

# Are DAGs paused by default at creation
dags_are_paused_at_creation = True

# Default timezone
default_timezone = utc

# The maximum number of active DAG runs per DAG
max_active_runs_per_dag = 16

# The maximum number of task instances allowed to run concurrently in each DAG
max_active_tasks_per_dag = 16

# Secret key to save connection passwords in the db
# This is set via environment variable AIRFLOW__CORE__FERNET_KEY
# fernet_key =

[database]
# The SQLAlchemy connection string to the metadata database
# This is set via environment variable AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
# sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@postgres/airflow

[logging]
# The folder where airflow should store its log files
base_log_folder = /opt/airflow/logs

# Logging level
logging_level = INFO

[api]
# Enable Swagger UI for API documentation
enable_swagger_ui = True

# The port on which to run the API server
port = 8080

# The host on which to run the API server
host = 0.0.0.0

[scheduler]
# Turn off scheduler catchup by default
# This prevents backfilling of missed DAG runs
catchup_by_default = False

# How often the scheduler should check for orphaned tasks
orphaned_tasks_check_interval = 300.0

# The scheduler constantly tries to trigger new tasks
scheduler_heartbeat_sec = 5

[celery]
# The Celery broker URL
# This is set via environment variable AIRFLOW__CELERY__BROKER_URL
# broker_url = redis://redis:6379/0

# The Celery result backend
# This is set via environment variable AIRFLOW__CELERY__RESULT_BACKEND
# result_backend = db+postgresql://airflow:airflow@postgres/airflow

# The concurrency that will be used when starting workers
worker_concurrency = 16

[webserver]
# NOTE: In Airflow 3.x, webserver is replaced by api-server
# These settings are kept for reference but may not apply

# The base url of your website
# base_url = http://localhost:8080

# Expose the configuration file in the web server
expose_config = False